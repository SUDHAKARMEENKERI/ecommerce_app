<header class="app-header">
  <div class="app-header-left">
    <span class="app-logo">MediCare POS</span>
  </div>
  <div class="app-header-right">
    <button class="app-header-bell" aria-label="Notifications">
      <span class="app-header-bell-icon"></span>
    </button>
    <div class="app-header-avatar" [title]="profile.fullName">
      {{ initials }}
    </div>
    <button class="app-header-auth-btn" (click)="onLoginLogout()">
      {{ isLoggedIn ? 'Logout' : 'Login' }}
    </button>
  </div>
</header>
